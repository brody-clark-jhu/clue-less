<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <title>Clue-Less</title>
  <style>
    .screen {
      display: none;
      width: 100%;
      min-height: 100vh;
    }

    .screen.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>

  <!-- Home Screen -->
  <div id="landing-screen" class="screen active">
    <div class="landing-content">
      <div class="landing-title-group">
        <h1 class="landing-title">CLUE<span class="landing-accent">LESS</span></h1>
        <div class="landing-divider"></div>
        <p class="landing-tagline">Just like the real game ... but less!</p>
      </div>
      <div class="landing-bottom">
        <button type="button" id="btn-join-lobby" class="btn-landing">Join Lobby</button>
      </div>
    </div>

  </div>

  <!-- Lobby Screen -->
  <div id="lobby-screen" class="screen">
    <div class="lobby-layout"> 
        <h1 class="lobby-title">LOBBY</h1>

      <!-- left pane: character selection cards -->
      <div class="lobby-left"> 
        <h2 class="lobby-pane-title">Choose Your Character</h2>
        <div class="character-grid"> 

          <!-- Miss Scarlet card -->
          <!-- data-character matches server character name exactly -->
          <button class="character-card" data-character="Miss Scarlet" type="button">
            <div class="character-card-top">
              <span class="character-name">Miss Scarlet</span>
              <div class="character-avatar avatar-scarlet">
                <span class="character-initial">S</span>
              </div>
            </div>
            <div class="character-card-image">
              <img src="/images/character_scarlet.png" alt="Miss Scarlet" />
            </div>
            <div class="character-card-bottom">
              <span class="character-status">Available</span>
              <div class="character-select-indicator">✓</div>
            </div>
          </button>

          <!-- Colonel Mustard card -->
          <!-- data-character matches server value "Col. Mustard" exactly -->
          <button class="character-card" data-character="Col. Mustard" type="button">
            <div class="character-card-top">
              <span class="character-name">Col. Mustard</span>
              <div class="character-avatar avatar-mustard">
                <span class="character-initial">M</span>
              </div>
            </div>
            <div class="character-card-image">
              <img src="/images/character_mustard.png" alt="Colonel Mustard" />
            </div>
            <div class="character-card-bottom">
              <span class="character-status">Available</span>
              <div class="character-select-indicator">✓</div>
            </div>
          </button>

          <!-- Mrs. White card -->
          <button class="character-card" data-character="Mrs. White" type="button">
            <div class="character-card-top">
              <span class="character-name">Mrs. White</span>
              <div class="character-avatar avatar-white">
                <span class="character-initial">W</span>
              </div>
            </div>
            <div class="character-card-image">
              <img src="/images/character_white.png" alt="Mrs. White" />
            </div>
            <div class="character-card-bottom">
              <span class="character-status">Available</span>
              <div class="character-select-indicator">✓</div>
            </div>
          </button>

          <!-- Mr. Green card -->
          <button class="character-card" data-character="Mr. Green" type="button">
            <div class="character-card-top">
              <span class="character-name">Mr. Green</span>
              <div class="character-avatar avatar-green">
                <span class="character-initial">G</span>
              </div>
            </div>
            <div class="character-card-image">
              <img src="/images/character_green.png" alt="Mr. Green" />
            </div>
            <div class="character-card-bottom">
              <span class="character-status">Available</span>
              <div class="character-select-indicator">✓</div>
            </div>
          </button>

          <!-- Mrs. Peacock card -->
          <button class="character-card" data-character="Mrs. Peacock" type="button">
            <div class="character-card-top">
              <span class="character-name">Mrs. Peacock</span>
              <div class="character-avatar avatar-peacock">
                <span class="character-initial">P</span>
              </div>
            </div>
            <div class="character-card-image">
              <img src="/images/character_peacock.png" alt="Mrs. Peacock" />
            </div>
            <div class="character-card-bottom">
              <span class="character-status">Available</span>
              <div class="character-select-indicator">✓</div>
            </div>
          </button>

          <!-- Professor Plum card -->
          <button class="character-card" data-character="Professor Plum" type="button">
            <div class="character-card-top">
              <span class="character-name">Professor Plum</span>
              <div class="character-avatar avatar-plum">
                <span class="character-initial">P</span>
              </div>
            </div>
            <div class="character-card-image">
              <img src="/images/character_plum.png" alt="Professor Plum" />
            </div>
            <div class="character-card-bottom">
              <span class="character-status">Available</span>
              <div class="character-select-indicator">✓</div>
            </div>
          </button>

        </div> 
      </div> 

      <!-- right pane: player slots and action buttons -->
      <div class="lobby-right"> 
        <h2 class="lobby-pane-title">Players <span id="lobby-player-count">(0/6)</span></h2> 

        <!-- six player slots -->
        <div class="player-slots"> 
          <div class="player-slot" id="slot-1"> 
            <div class="slot-number">1</div> 
            <div class="slot-info"> 
              <span class="slot-label">Waiting...</span> 
              <span class="slot-character"></span> 
            </div> 
            <div class="slot-badge"></div> 
          </div> 
          <div class="player-slot" id="slot-2"> 
            <div class="slot-number">2</div> 
            <div class="slot-info"> 
              <span class="slot-label">Waiting...</span> 
              <span class="slot-character"></span> 
            </div> 
            <div class="slot-badge"></div> 
          </div> 
          <div class="player-slot" id="slot-3"> 
            <div class="slot-number">3</div> 
            <div class="slot-info"> 
              <span class="slot-label">Waiting...</span> 
              <span class="slot-character"></span> 
            </div> 
            <div class="slot-badge"></div> 
          </div> 
          <div class="player-slot" id="slot-4">
            <div class="slot-number">4</div> 
            <div class="slot-info"> 
              <span class="slot-label">Waiting...</span>
              <span class="slot-character"></span> 
            </div> 
            <div class="slot-badge"></div> 
          </div> 
          <div class="player-slot" id="slot-5"> 
            <div class="slot-number">5</div> 
            <div class="slot-info"> 
              <span class="slot-label">Waiting...</span> 
              <span class="slot-character"></span> 
            </div> 
            <div class="slot-badge"></div> 
          </div> 
          <div class="player-slot" id="slot-6"> 
            <div class="slot-number">6</div> 
            <div class="slot-info"> 
              <span class="slot-label">Waiting...</span> 
              <span class="slot-character"></span>
            </div> 
            <div class="slot-badge"></div> 
          </div>
        </div> 

        <!-- Ready Up and Start Game buttons -->
        <div class="lobby-actions"> 
          <button type="button" id="btn-ready-up" class="btn-ready" disabled>
            Ready Up 
          </button> 
          <button type="button" id="btn-start-game" class="btn-start" style="display:none;"> 
            Start Game 
          </button> 
        </div> 

      </div> 
    </div> 
  </div>

  <!-- Game board screen -->
  <div id="game-board-screen" class="screen">
    <div id="header-bar">
      <h1 id="title"> Clue-Less </h1>
      <div id="hand-display">
        <h2>Your hand:</h2>
        <ol id="player-hand-list">
          <li class="hand-item"></li>
        </ol>
      </div>
    </div>
    <div id="body">
      <div id="board-wrapper">
        <div id="board-container">
          <!-- Image Map Generated by http://www.image-map.net/ -->
          <img src="./images/game_board.png" usemap="#image-map">
          <map name="image-map">
            <area target="_self" alt="library" title="library" href="" coords="41,414,402,670" shape="rect">
            <area target="_self" alt="study" title="study" href="" coords="48,58,404,303" shape="rect">
            <area target="_self" alt="hall" title="hall" href="" coords="782,39,1126,287" shape="rect">
            <area target="_self" alt="lounge" title="lounge" href="" coords="1512,34,1856,287" shape="rect">
            <area target="_self" alt="dining-room" title="dining-room" href="" coords="1531,422,1868,671" shape="rect">
            <area target="_self" alt="kitchen" title="kitchen" href="" coords="1522,800,1883,1058" shape="rect">
            <area target="_self" alt="ballroom" title="ballroom" href="" coords="799,802,1145,1054" shape="rect">
            <area target="_self" alt="conservatory" title="conservatory" href="" coords="36,790,392,1047" shape="rect">
            <area target="_self" alt="billiard-room" title="billiard-room" href="" coords="794,427,1133,680"
              shape="rect">
            <area target="_self" alt="study-hall" title="study-hall" href="" coords="423,71,756,251" shape="rect">
            <area target="_self" alt="hall-lounge" title="hall-lounge" href="" coords="1151,75,1482,246" shape="rect">
            <area target="_self" alt="library-billiard-room" title="library-billiard-room" href=""
              coords="416,464,772,647" shape="rect">
            <area target="_self" alt="study-library" title="study-library" href="" coords="138,317,321,403"
              shape="rect">
            <area target="_self" alt="library-conservatory" title="library-conservatory" href=""
              coords="131,676,318,768" shape="rect">
            <area target="_self" alt="conservatory-ballroom" title="conservatory-ballroom" href=""
              coords="411,847,780,1023" shape="rect">
            <area target="_self" alt="ballroom-kitchen" title="ballroom-kitchen" href="" coords="1168,847,1514,1026"
              shape="rect">
            <area target="_self" alt="dining-room-kitchen" title="dining-room-kitchen" href=""
              coords="1611,688,1792,785" shape="rect">
            <area target="_self" alt="billiard-room-dining-room" title="billiard-room-dining-room" href=""
              coords="1161,463,1500,644" shape="rect">
            <area target="_self" alt="hall-billiard-room" title="hall-billiard-room" href="" coords="877,299,1060,406"
              shape="rect">
            <area target="_self" alt="billiard-room-ballroom" title="billiard-room-ballroom" href=""
              coords="880,689,1056,784" shape="rect">
            <area target="_self" alt="lounge-dining-room" title="lounge-dining-room" href="" coords="1614,297,1790,408"
              shape="rect">
          </map>

        </div>
        <div id="button-bar">
          <div id="player-capsule">
            <div id="player-profile"></div>
            <div id="player-text">
              <h3 id="player-id">Player 0</h3>
              <h3 id="player-name">Character</h3>
            </div>
          </div>
          <button id="move" type="button">Move</button>
          <button id="suggestion" type="button">Make Suggestions</button>
          <button id="accusation" type="button">Accusation</button>
          <button id="end-turn" type="button">End Turn</button>
        </div>
      </div>
      <div id="notebook">
        <div id="notebook-title">Notebook</div>
        <ul id="notebook-list">
          <li id="notebook-item" class="notebook-item">
            <input id="nb-1" type="checkbox" name="notebook" />
            <label for="nb-1">Colonel Mustard</label>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
