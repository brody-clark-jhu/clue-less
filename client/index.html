<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>clue-less</title>
  </head>
  <body>
    <!-- Home Page -->
    <div id="landing-screen" class="screen active">
      <div class="landing-overlay"></div>
      <div class="landing-content">
        <div class="landing-title-group">
          <h1 class="landing-title">CLUE<span class="landing-accent">LESS</span></h1>
        </div>
        <div class="landing-bottom">
          <button type="button" id="btn-join-lobby" class="btn-landing">Join Lobby</button>
          <p class="landing-hint">2–6 players required</p>
        </div>
      </div>
    </div>
 
    <!-- Lobby Page -->
    <div id="lobby-screen" class="screen">
      <div id="app">
        <h1 id="display-message">Display Message</h1>
        <button type="button" id="request">Request</button>
      </div>
      <!--TODO Add some more logic for character view and host. -->
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
